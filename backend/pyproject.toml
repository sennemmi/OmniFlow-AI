[tool.pytest.ini_options]
asyncio_mode = "auto"          # 所有 async def test_ 自动识别，不需要手动加 @mark
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --color=yes"

# 按标签分层运行
markers = [
    "unit: 单元测试，不依赖外部服务",
    "integration: 集成测试，mock 外部服务",
    "e2e: 端到端测试，需要真实环境",
    "slow: 运行超过 5s 的测试",
]
