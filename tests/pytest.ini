[pytest]
# 测试目录
 testpaths = tests

# 测试文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步测试配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 标记定义
markers =
    functional: 功能测试
    pipeline: Pipeline 引擎测试
    agent: Agent 编排测试
    visual: 可视化工作区测试
    defense: 防御性测试
    security: 安全测试
    performance: 性能测试
    resilience: 弹性测试
    e2e: 端到端测试
    slow: 慢速测试

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 覆盖率配置
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
